<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#34495e"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="#fbfcfe"/>
  <text x="600.0" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#17202a">AWS STS AssumeRole Flow</text>

<line x1="225" y1="227.5" x2="290" y2="227.5" stroke="#34495e" stroke-width="2.5" marker-end="url(#arrow)" />
<rect x="152.5" y="201.5" width="210" height="28" rx="14" fill="#ffffff" stroke="#d5d8dc"/>
<text x="257.5" y="220.5" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#2c3e50">1. Call STS</text>
<line x1="480" y1="227.5" x2="545" y2="142.5" stroke="#34495e" stroke-width="2.5" marker-end="url(#arrow)" />
<rect x="407.5" y="159.0" width="210" height="28" rx="14" fill="#ffffff" stroke="#d5d8dc"/>
<text x="512.5" y="178.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#2c3e50">2. Validate trust</text>
<line x1="755" y1="142.5" x2="815" y2="227.5" stroke="#34495e" stroke-width="2.5" marker-end="url(#arrow)" />
<rect x="680.0" y="159.0" width="210" height="28" rx="14" fill="#ffffff" stroke="#d5d8dc"/>
<text x="785.0" y="178.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#2c3e50">3. Issue credentials</text>
<line x1="755" y1="317.5" x2="815" y2="227.5" stroke="#34495e" stroke-width="2.5" marker-end="url(#arrow)" />
<rect x="680.0" y="246.5" width="210" height="28" rx="14" fill="#ffffff" stroke="#d5d8dc"/>
<text x="785.0" y="265.5" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#2c3e50">Policies limit access</text>
<line x1="1035" y1="227.5" x2="815" y2="452.5" stroke="#34495e" stroke-width="2.5" marker-end="url(#arrow)" />
<rect x="820.0" y="314.0" width="210" height="28" rx="14" fill="#ffffff" stroke="#d5d8dc"/>
<text x="925.0" y="333.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#2c3e50">4. Access resources</text>
<line x1="480" y1="227.5" x2="290" y2="452.5" stroke="#34495e" stroke-width="2.5" marker-end="url(#arrow)" />
<rect x="280.0" y="314.0" width="210" height="28" rx="14" fill="#ffffff" stroke="#d5d8dc"/>
<text x="385.0" y="333.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#2c3e50">Logged</text>
<rect x="35" y="180" width="190" height="95" rx="16" fill="#eaf2ff" stroke="#2e86de" stroke-width="2" filter="url(#shadow)"/>
<text x="130.0" y="216.5" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#17202a">Caller</text>
<text x="130.0" y="240.5" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="400" fill="#17202a">IAM User/Role/App</text>
<rect x="290" y="180" width="190" height="95" rx="16" fill="#fef9e7" stroke="#f1c40f" stroke-width="2" filter="url(#shadow)"/>
<text x="385.0" y="216.5" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#17202a">STS Request</text>
<text x="385.0" y="240.5" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="400" fill="#17202a">AssumeRole</text>
<rect x="545" y="95" width="210" height="95" rx="16" fill="#f4ecf7" stroke="#8e44ad" stroke-width="2" filter="url(#shadow)"/>
<text x="650.0" y="131.5" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#17202a">Trust Policy</text>
<text x="650.0" y="155.5" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="400" fill="#17202a">Who can assume?</text>
<rect x="545" y="270" width="210" height="95" rx="16" fill="#eafaf1" stroke="#229954" stroke-width="2" filter="url(#shadow)"/>
<text x="650.0" y="306.5" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#17202a">Permission Policy</text>
<text x="650.0" y="330.5" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="400" fill="#17202a">What can it do?</text>
<rect x="815" y="180" width="220" height="95" rx="16" fill="#e8f8f5" stroke="#16a085" stroke-width="2" filter="url(#shadow)"/>
<text x="925.0" y="216.5" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#17202a">Temporary Credentials</text>
<text x="925.0" y="240.5" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="400" fill="#17202a">Access key + secret + token</text>
<rect x="815" y="405" width="220" height="95" rx="16" fill="#fdf2e9" stroke="#d35400" stroke-width="2" filter="url(#shadow)"/>
<text x="925.0" y="441.5" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#17202a">AWS API Calls</text>
<text x="925.0" y="465.5" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="400" fill="#17202a">Use temp credentials</text>
<rect x="290" y="405" width="190" height="95" rx="16" fill="#f8f9f9" stroke="#566573" stroke-width="2" filter="url(#shadow)"/>
<text x="385.0" y="441.5" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#17202a">CloudTrail</text>
<text x="385.0" y="465.5" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="400" fill="#17202a">Audit record</text>
