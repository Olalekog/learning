<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560">

<defs>
  <style>
    .title{font-family:Arial,Helvetica,sans-serif;font-size:24px;font-weight:700;fill:#111827}
    .sub{font-family:Arial,Helvetica,sans-serif;font-size:13px;fill:#374151}
    .box{fill:#f8fafc;stroke:#2563eb;stroke-width:2;rx:14;ry:14}
    .box2{fill:#fff7ed;stroke:#ea580c;stroke-width:2;rx:14;ry:14}
    .box3{fill:#ecfdf5;stroke:#059669;stroke-width:2;rx:14;ry:14}
    .box4{fill:#fef2f2;stroke:#dc2626;stroke-width:2;rx:14;ry:14}
    .label{font-family:Arial,Helvetica,sans-serif;font-size:16px;font-weight:700;fill:#111827}
    .small{font-family:Arial,Helvetica,sans-serif;font-size:12px;fill:#374151}
    .arrow{stroke:#111827;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
    .dashed{stroke-dasharray:7 5;}
  </style>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L0,6 L9,3 z" fill="#111827" />
  </marker>
</defs>

<rect x="0" y="0" width="1200" height="560" fill="#ffffff"/>
<text x="40" y="50" class="title">Secret Retrieval Flow</text>
<text x="40" y="75" class="sub">How an application securely retrieves a secret at runtime.</text>
<rect x="45" y="150" width="200" height="95" class="box"/>
<text x="63" y="182" class="label">1. Application</text>
<text x="63" y="208" class="small">Needs DB/API credential</text>
<text x="63" y="226" class="small">Calls AWS SDK</text>
<rect x="315" y="150" width="200" height="95" class="box4"/>
<text x="333" y="182" class="label">2. IAM AuthZ</text>
<text x="333" y="208" class="small">Evaluate principal policy</text>
<text x="333" y="226" class="small">Resource policy/conditions</text>
<rect x="585" y="150" width="220" height="95" class="box2"/>
<text x="603" y="182" class="label">3. Secrets Manager</text>
<text x="603" y="208" class="small">Find current version</text>
<text x="603" y="226" class="small">AWSCURRENT label</text>
<rect x="875" y="150" width="200" height="95" class="box4"/>
<text x="893" y="182" class="label">4. AWS KMS</text>
<text x="893" y="208" class="small">Decrypt secret value</text>
<text x="893" y="226" class="small">Check KMS permissions</text>
<rect x="585" y="370" width="220" height="95" class="box3"/>
<text x="603" y="402" class="label">5. Secret Returned</text>
<text x="603" y="428" class="small">Credential returned over TLS</text>
<text x="603" y="446" class="small">App connects to target</text>
<rect x="875" y="370" width="200" height="95" class="box"/>
<text x="893" y="402" class="label">6. CloudTrail</text>
<text x="893" y="428" class="small">Log GetSecretValue</text>
<text x="893" y="446" class="small">Audit access pattern</text>
<path d="M245,197 C280.0,197 280.0,197 315,197" class="arrow"/>
<text x="220.0" y="189.0" class="small">request</text>
<path d="M515,197 C550.0,197 550.0,197 585,197" class="arrow"/>
<text x="490.0" y="189.0" class="small">allowed</text>
<path d="M805,197 C840.0,197 840.0,197 875,197" class="arrow"/>
<text x="780.0" y="189.0" class="small">decrypt</text>
<path d="M875,245 C790.0,245 790.0,370 705,370" class="arrow"/>
<text x="730.0" y="299.5" class="small">plaintext to service</text>
<path d="M805,418 C840.0,418 840.0,418 875,418" class="arrow dashed"/>
<text x="780.0" y="410.0" class="small">audit</text>
<path d="M685,245 C685.0,245 685.0,370 685,370" class="arrow"/>
<text x="625.0" y="299.5" class="small">return</text>
</svg>