<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="570" viewBox="0 0 1200 570">

<defs>
  <style>
    .title{font-family:Arial,Helvetica,sans-serif;font-size:24px;font-weight:700;fill:#111827}
    .sub{font-family:Arial,Helvetica,sans-serif;font-size:13px;fill:#374151}
    .box{fill:#f8fafc;stroke:#2563eb;stroke-width:2;rx:14;ry:14}
    .box2{fill:#fff7ed;stroke:#ea580c;stroke-width:2;rx:14;ry:14}
    .box3{fill:#ecfdf5;stroke:#059669;stroke-width:2;rx:14;ry:14}
    .box4{fill:#fef2f2;stroke:#dc2626;stroke-width:2;rx:14;ry:14}
    .label{font-family:Arial,Helvetica,sans-serif;font-size:16px;font-weight:700;fill:#111827}
    .small{font-family:Arial,Helvetica,sans-serif;font-size:12px;fill:#374151}
    .arrow{stroke:#111827;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
    .dashed{stroke-dasharray:7 5;}
  </style>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L0,6 L9,3 z" fill="#111827" />
  </marker>
</defs>

<rect x="0" y="0" width="1200" height="570" fill="#ffffff"/>
<text x="40" y="50" class="title">Secret Rotation Flow</text>
<text x="40" y="75" class="sub">Automatic credential rotation updates both the secret and the target service.</text>
<rect x="45" y="135" width="210" height="100" class="box"/>
<text x="63" y="167" class="label">1. Schedule</text>
<text x="63" y="193" class="small">rate() or cron()</text>
<text x="63" y="211" class="small">Rotation window</text>
<rect x="325" y="135" width="230" height="100" class="box2"/>
<text x="343" y="167" class="label">2. Secrets Manager</text>
<text x="343" y="193" class="small">Creates pending version</text>
<text x="343" y="211" class="small">Uses AWSPENDING label</text>
<rect x="625" y="135" width="230" height="100" class="box"/>
<text x="643" y="167" class="label">3. Lambda Function</text>
<text x="643" y="193" class="small">createSecret</text>
<text x="643" y="211" class="small">setSecret</text>
<rect x="925" y="135" width="220" height="100" class="box3"/>
<text x="943" y="167" class="label">4. Target Service</text>
<text x="943" y="193" class="small">Database/API credential</text>
<text x="943" y="211" class="small">Password/key updated</text>
<rect x="625" y="355" width="230" height="100" class="box4"/>
<text x="643" y="387" class="label">5. Test Secret</text>
<text x="643" y="413" class="small">testSecret validates login</text>
<text x="643" y="431" class="small">Fail keeps current safe</text>
<rect x="325" y="355" width="230" height="100" class="box2"/>
<text x="343" y="387" class="label">6. Finish Rotation</text>
<text x="343" y="413" class="small">finishSecret moves label</text>
<text x="343" y="431" class="small">AWSCURRENT updated</text>
<rect x="45" y="355" width="210" height="100" class="box3"/>
<text x="63" y="387" class="label">7. Application</text>
<text x="63" y="413" class="small">Next retrieval gets</text>
<text x="63" y="431" class="small">new current secret</text>
<path d="M255,185 C290.0,185 290.0,185 325,185" class="arrow"/>
<text x="230.0" y="177.0" class="small">trigger</text>
<path d="M555,185 C590.0,185 590.0,185 625,185" class="arrow"/>
<text x="530.0" y="177.0" class="small">invoke</text>
<path d="M855,185 C890.0,185 890.0,185 925,185" class="arrow"/>
<text x="830.0" y="177.0" class="small">update credential</text>
<path d="M740,235 C740.0,235 740.0,355 740,355" class="arrow"/>
<text x="680.0" y="287.0" class="small">validate</text>
<path d="M625,405 C590.0,405 590.0,405 555,405" class="arrow"/>
<text x="530.0" y="397.0" class="small">complete</text>
<path d="M325,405 C290.0,405 290.0,405 255,405" class="arrow"/>
<text x="230.0" y="397.0" class="small">new secret</text>
<path d="M150,355 C150.0,355 150.0,235 150,235" class="arrow dashed"/>
<text x="90.0" y="287.0" class="small">next read</text>
</svg>