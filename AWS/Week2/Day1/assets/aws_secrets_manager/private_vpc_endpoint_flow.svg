<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="580" viewBox="0 0 1200 580">

<defs>
  <style>
    .title{font-family:Arial,Helvetica,sans-serif;font-size:24px;font-weight:700;fill:#111827}
    .sub{font-family:Arial,Helvetica,sans-serif;font-size:13px;fill:#374151}
    .box{fill:#f8fafc;stroke:#2563eb;stroke-width:2;rx:14;ry:14}
    .box2{fill:#fff7ed;stroke:#ea580c;stroke-width:2;rx:14;ry:14}
    .box3{fill:#ecfdf5;stroke:#059669;stroke-width:2;rx:14;ry:14}
    .box4{fill:#fef2f2;stroke:#dc2626;stroke-width:2;rx:14;ry:14}
    .label{font-family:Arial,Helvetica,sans-serif;font-size:16px;font-weight:700;fill:#111827}
    .small{font-family:Arial,Helvetica,sans-serif;font-size:12px;fill:#374151}
    .arrow{stroke:#111827;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
    .dashed{stroke-dasharray:7 5;}
  </style>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L0,6 L9,3 z" fill="#111827" />
  </marker>
</defs>

<rect x="0" y="0" width="1200" height="580" fill="#ffffff"/>
<text x="40" y="50" class="title">Private VPC Endpoint Flow</text>
<text x="40" y="75" class="sub">Private workloads access Secrets Manager through AWS PrivateLink instead of the public internet.</text>
<rect x="45" y="150" width="240" height="105" class="box"/>
<text x="63" y="182" class="label">Private Subnet Workload</text>
<text x="63" y="208" class="small">EC2/ECS/EKS/Lambda ENI</text>
<text x="63" y="226" class="small">No public IP required</text>
<rect x="365" y="150" width="250" height="105" class="box3"/>
<text x="383" y="182" class="label">Interface VPC Endpoint</text>
<text x="383" y="208" class="small">com.amazonaws.region.secretsmanager</text>
<text x="383" y="226" class="small">Security group controls access</text>
<rect x="700" y="150" width="245" height="105" class="box"/>
<text x="718" y="182" class="label">AWS PrivateLink</text>
<text x="718" y="208" class="small">Private AWS network path</text>
<text x="718" y="226" class="small">No IGW/NAT required</text>
<rect x="45" y="365" width="240" height="105" class="box2"/>
<text x="63" y="397" class="label">AWS Secrets Manager</text>
<text x="63" y="423" class="small">Secret retrieval API</text>
<text x="63" y="441" class="small">Encrypted secret storage</text>
<rect x="365" y="365" width="250" height="105" class="box4"/>
<text x="383" y="397" class="label">AWS KMS Endpoint</text>
<text x="383" y="423" class="small">Optional private KMS path</text>
<text x="383" y="441" class="small">Decrypt operations</text>
<rect x="700" y="365" width="245" height="105" class="box"/>
<text x="718" y="397" class="label">CloudTrail</text>
<text x="718" y="423" class="small">Records API activity</text>
<text x="718" y="441" class="small">Security monitoring</text>
<path d="M285,202 C325.0,202 325.0,202 365,202" class="arrow"/>
<text x="265.0" y="194.0" class="small">private DNS</text>
<path d="M615,202 C657.5,202 657.5,202 700,202" class="arrow"/>
<text x="597.5" y="194.0" class="small">AWS backbone</text>
<path d="M820,255 C492.5,255 492.5,365 165,365" class="arrow"/>
<text x="432.5" y="302.0" class="small">GetSecretValue</text>
<path d="M285,418 C325.0,418 325.0,418 365,418" class="arrow"/>
<text x="265.0" y="410.0" class="small">Decrypt</text>
<path d="M615,418 C657.5,418 657.5,418 700,418" class="arrow dashed"/>
<text x="597.5" y="410.0" class="small">Audit</text>
</svg>