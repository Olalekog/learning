<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560">

<defs>
  <style>
    .title{font-family:Arial,Helvetica,sans-serif;font-size:24px;font-weight:700;fill:#111827}
    .sub{font-family:Arial,Helvetica,sans-serif;font-size:13px;fill:#374151}
    .box{fill:#f8fafc;stroke:#2563eb;stroke-width:2;rx:14;ry:14}
    .box2{fill:#fff7ed;stroke:#ea580c;stroke-width:2;rx:14;ry:14}
    .box3{fill:#ecfdf5;stroke:#059669;stroke-width:2;rx:14;ry:14}
    .box4{fill:#fef2f2;stroke:#dc2626;stroke-width:2;rx:14;ry:14}
    .label{font-family:Arial,Helvetica,sans-serif;font-size:16px;font-weight:700;fill:#111827}
    .small{font-family:Arial,Helvetica,sans-serif;font-size:12px;fill:#374151}
    .arrow{stroke:#111827;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
    .dashed{stroke-dasharray:7 5;}
  </style>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L0,6 L9,3 z" fill="#111827" />
  </marker>
</defs>

<rect x="0" y="0" width="1200" height="560" fill="#ffffff"/>
<text x="40" y="50" class="title">Cross-Account Secret Access Flow</text>
<text x="40" y="75" class="sub">Account B application reads a secret owned by Account A using IAM, resource policy, and KMS permissions.</text>
<rect x="45" y="140" width="230" height="110" class="box"/>
<text x="63" y="172" class="label">Account B App Role</text>
<text x="63" y="198" class="small">ApplicationRole</text>
<text x="63" y="216" class="small">Identity policy allows GetSecretValue</text>
<rect x="360" y="140" width="240" height="110" class="box2"/>
<text x="378" y="172" class="label">Account A Secret</text>
<text x="378" y="198" class="small">Resource policy trusts role</text>
<text x="378" y="216" class="small">Secret stores credential</text>
<rect x="705" y="140" width="230" height="110" class="box4"/>
<text x="723" y="172" class="label">Account A KMS Key</text>
<text x="723" y="198" class="small">Key policy allows role</text>
<text x="723" y="216" class="small">kms:Decrypt permission</text>
<rect x="360" y="370" width="240" height="95" class="box3"/>
<text x="378" y="402" class="label">Secrets Manager API</text>
<text x="378" y="428" class="small">Returns secret after authorization</text>
<text x="378" y="446" class="small">TLS encrypted response</text>
<rect x="705" y="370" width="230" height="95" class="box"/>
<text x="723" y="402" class="label">CloudTrail Logs</text>
<text x="723" y="428" class="small">Events in owning Region</text>
<text x="723" y="446" class="small">Audit principal and API call</text>
<path d="M275,195 C317.5,195 317.5,195 360,195" class="arrow"/>
<text x="257.5" y="187.0" class="small">GetSecretValue</text>
<path d="M600,195 C652.5,195 652.5,195 705,195" class="arrow"/>
<text x="592.5" y="187.0" class="small">Decrypt</text>
<path d="M480,250 C480.0,250 480.0,370 480,370" class="arrow"/>
<text x="420.0" y="302.0" class="small">return secret</text>
<path d="M600,418 C652.5,418 652.5,418 705,418" class="arrow dashed"/>
<text x="592.5" y="410.0" class="small">log events</text>
</svg>