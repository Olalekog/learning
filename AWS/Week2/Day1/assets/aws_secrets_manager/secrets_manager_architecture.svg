<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">

<defs>
  <style>
    .title{font-family:Arial,Helvetica,sans-serif;font-size:24px;font-weight:700;fill:#111827}
    .sub{font-family:Arial,Helvetica,sans-serif;font-size:13px;fill:#374151}
    .box{fill:#f8fafc;stroke:#2563eb;stroke-width:2;rx:14;ry:14}
    .box2{fill:#fff7ed;stroke:#ea580c;stroke-width:2;rx:14;ry:14}
    .box3{fill:#ecfdf5;stroke:#059669;stroke-width:2;rx:14;ry:14}
    .box4{fill:#fef2f2;stroke:#dc2626;stroke-width:2;rx:14;ry:14}
    .label{font-family:Arial,Helvetica,sans-serif;font-size:16px;font-weight:700;fill:#111827}
    .small{font-family:Arial,Helvetica,sans-serif;font-size:12px;fill:#374151}
    .arrow{stroke:#111827;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
    .dashed{stroke-dasharray:7 5;}
  </style>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L0,6 L9,3 z" fill="#111827" />
  </marker>
</defs>

<rect x="0" y="0" width="1200" height="760" fill="#ffffff"/>
<text x="40" y="50" class="title">AWS Secrets Manager Architecture</text>
<text x="40" y="75" class="sub">Centralized secret storage, KMS encryption, IAM authorization, private access, rotation, and audit logging.</text>
<rect x="40" y="130" width="210" height="110" class="box"/>
<text x="58" y="162" class="label">Application</text>
<text x="58" y="188" class="small">EC2, ECS, EKS, Lambda</text>
<text x="58" y="206" class="small">Uses SDK/CLI to request secret</text>
<rect x="330" y="125" width="235" height="120" class="box3"/>
<text x="348" y="157" class="label">VPC Endpoint</text>
<text x="348" y="183" class="small">PrivateLink interface endpoint</text>
<text x="348" y="201" class="small">No public internet required</text>
<rect x="650" y="120" width="245" height="135" class="box2"/>
<text x="668" y="152" class="label">AWS Secrets Manager</text>
<text x="668" y="178" class="small">Stores secret value/metadata</text>
<text x="668" y="196" class="small">Version staging labels</text>
<text x="668" y="214" class="small">Resource policies/tags</text>
<rect x="970" y="130" width="190" height="110" class="box4"/>
<text x="988" y="162" class="label">AWS KMS</text>
<text x="988" y="188" class="small">Encrypts/decrypts secret</text>
<text x="988" y="206" class="small">Customer managed or AWS key</text>
<rect x="650" y="330" width="245" height="120" class="box"/>
<text x="668" y="362" class="label">Rotation Lambda</text>
<text x="668" y="388" class="small">Updates credential on schedule</text>
<text x="668" y="406" class="small">Single-user or alternating-user</text>
<rect x="970" y="335" width="190" height="100" class="box3"/>
<text x="988" y="367" class="label">Database/Service</text>
<text x="988" y="393" class="small">RDS, Redshift, API keys</text>
<text x="988" y="411" class="small">Target credential changed</text>
<rect x="650" y="535" width="245" height="95" class="box"/>
<text x="668" y="567" class="label">CloudTrail / EventBridge</text>
<text x="668" y="593" class="small">Audit API activity</text>
<text x="668" y="611" class="small">Route events/alerts</text>
<rect x="330" y="535" width="235" height="95" class="box4"/>
<text x="348" y="567" class="label">IAM Policies</text>
<text x="348" y="593" class="small">Identity-based access</text>
<text x="348" y="611" class="small">Least privilege conditions</text>
<path d="M250,185 C290.0,185 290.0,185 330,185" class="arrow"/>
<text x="230.0" y="177.0" class="small">GetSecretValue</text>
<path d="M565,185 C607.5,185 607.5,185 650,185" class="arrow"/>
<text x="547.5" y="177.0" class="small">private API</text>
<path d="M895,185 C932.5,185 932.5,185 970,185" class="arrow"/>
<text x="872.5" y="177.0" class="small">Decrypt</text>
<path d="M770,255 C770.0,255 770.0,330 770,330" class="arrow"/>
<text x="710.0" y="284.5" class="small">Rotate schedule</text>
<path d="M895,390 C932.5,390 932.5,390 970,390" class="arrow"/>
<text x="872.5" y="382.0" class="small">Update password</text>
<path d="M650,585 C607.5,585 607.5,585 565,585" class="arrow dashed"/>
<text x="547.5" y="577.0" class="small">Authorization</text>
<path d="M770,255 C770.0,255 770.0,535 770,535" class="arrow dashed"/>
<text x="710.0" y="387.0" class="small">Audit events</text>
</svg>