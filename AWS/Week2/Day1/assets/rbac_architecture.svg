<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520">
  <defs>
    <style>
      .title{font:700 34px Arial;fill:#102a43}.box{fill:#f8fbff;stroke:#2563eb;stroke-width:2;rx:14}.role{fill:#eff6ff;stroke:#1d4ed8;stroke-width:2;rx:12}.policy{fill:#f5f3ff;stroke:#7c3aed;stroke-width:2;rx:12}.res{fill:#f0fdf4;stroke:#16a34a;stroke-width:2;rx:12}.txt{font:600 20px Arial;fill:#111827}.small{font:16px Arial;fill:#374151}.arrow{stroke:#111827;stroke-width:3;fill:none;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#111827"/></marker>
  </defs>
  <text x="600" y="45" text-anchor="middle" class="title">IAM RBAC Architecture — Role-Based Access Control</text>
  <rect x="40" y="100" width="210" height="290" class="box"/>
  <text x="145" y="135" text-anchor="middle" class="txt">Users / Teams</text>
  <text x="75" y="190" class="small">Alice — Developer</text>
  <text x="75" y="235" class="small">Bob — DBA</text>
  <text x="75" y="280" class="small">Charlie — Auditor</text>
  <rect x="335" y="95" width="235" height="305" class="role"/>
  <text x="452" y="130" text-anchor="middle" class="txt">IAM Roles</text>
  <text x="370" y="190" class="small">DeveloperRole</text>
  <text x="370" y="245" class="small">DatabaseAdminRole</text>
  <text x="370" y="300" class="small">ReadOnlyRole</text>
  <rect x="655" y="95" width="240" height="305" class="policy"/>
  <text x="775" y="130" text-anchor="middle" class="txt">Policies</text>
  <text x="690" y="190" class="small">EC2 / S3 / CloudWatch</text>
  <text x="690" y="245" class="small">RDS / Backup</text>
  <text x="690" y="300" class="small">Read-only permissions</text>
  <rect x="980" y="95" width="180" height="305" class="res"/>
  <text x="1070" y="130" text-anchor="middle" class="txt">AWS Resources</text>
  <text x="1020" y="190" class="small">EC2</text>
  <text x="1020" y="235" class="small">S3</text>
  <text x="1020" y="280" class="small">RDS</text>
  <text x="1020" y="325" class="small">CloudWatch</text>
  <path d="M250 245 H335" class="arrow"/><path d="M570 245 H655" class="arrow"/><path d="M895 245 H980" class="arrow"/>
  <rect x="70" y="430" width="1060" height="55" fill="#fff7ed" stroke="#f59e0b" stroke-width="2" rx="12"/>
  <text x="600" y="464" text-anchor="middle" class="small">RBAC grants permissions based on job function. Access changes usually require role or policy updates.</text>
</svg>
